<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>就业管理</title>
    <meta content="webkit" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" name="viewport"/>
    <link rel="stylesheet" th:href="@{/css/xadmin.css}">
    <link rel="stylesheet" th:href="@{/css/font.css}">
    <script charset="utf-8" th:src="@{/js/jquery.min.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/layui/layui.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/xadmin.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/vue.js}" type="text/javascript"></script>
</head>

<body>
<div class="x-nav">
            <span class="layui-breadcrumb">
                <a target="_top" th:href="@{/index}">首页</a>
            </span>
    <a class="layui-btn layui-btn-small" onclick="location.reload()"
       style="line-height:1.6em;margin-top:3px;float:right" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12" id="vmJob">
            <div class="layui-card">

                <div class="layui-card-header">
                    <button class="layui-btn" onclick="xadmin.open('添加就业','/jobAdd',500,800)">
                        <i class="layui-icon"></i>添加就业
                    </button>

                    <button class="layui-btn" id="uploadData">
                        <i class="layui-icon layui-icon-upload"></i>导入就业数据
                    </button>

                    <button class="layui-btn layui-btn-danger" id="truncateData">
                        <i class="layui-icon layui-icon-delete"></i>清空就业数据
                    </button>
                </div>
                <div class="layui-card-body">
                    <table class="layui-table layui-form">
                        <thead>
                        <tr>
                            <th>序号</th>
                            <th>年度</th>
                            <th>学号</th>
                            <th>性别</th>
                            <th>毕业去向</th>
                            <th>实际单位</th>
                            <th>单位所在地</th>
                            <th>单位隶属</th>
                            <th>单位性质</th>
                            <th>单位类型</th>
                            <th>行业性质</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr v-for="job,i in pageInfo.list">
                            <td v-text="i+1"></td>
                            <td v-text="job.year"></td>
                            <td v-text="job.stuNo"></td>
                            <td v-text="job.sex"></td>
                            <td v-text="job.afterGraduation"></td>
                            <td v-text="job.realCompany"></td>
                            <td v-text="job.companyLocation"></td>
                            <td v-text="job.companyUnder"></td>
                            <td v-text="job.companyNature"></td>
                            <td v-text="job.companyType"></td>
                            <td v-text="job.industryNature"></td>
                            <td class="td-manage">
                                <button @click="editJob(job.id)"
                                        class="layui-btn layui-btn-warm"
                                        id="editJob"
                                        onclick="xadmin.open('编辑就业','/jobEdit',500,800)">
                                    <i class="layui-icon">&#xe631;</i>编辑
                                </button>
                                <button @click="delJob(job.id)"
                                        class="layui-btn layui-btn-danger"
                                        id="delJob">
                                    <i class="layui-icon">&#xe640;</i>删除
                                </button>
                            </td>
                        </tr>
                        <tr v-if="pageInfo.total == 0">
                            <td colspan="100" style="text-align: center">暂无就业信息！</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="layui-card-body" v-if="pageInfo.total != 0">
                    <div class="page">
                        <div>
                            <a @click="getPage(pageInfo.firstPage)" class="prev" href="javascript:void(0)">
                                首页
                            </a>
                            <a @click="getPage(pageInfo.prePage)" class="prev" href="javascript:void(0)"
                               v-if="pageInfo.hasPreviousPage">
                                上一页
                            </a>
                            <span @click="getPage(pageInfo.pageNum)" class="current">{{pageInfo.pageNum}} / {{pageInfo.pages}}</span>
                            <a @click="getPage(pageInfo.nextPage)" class="next" href="javascript:void(0)"
                               v-if="pageInfo.hasNextPage">
                                下一页
                            </a>
                            <a @click="getPage(pageInfo.lastPage)" class="prev" href="javascript:void(0)"
                               v-if="!pageInfo.isLastPage">
                                末页
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript">

    vm = new Vue({
        el: "#vmJob",
        data: {
            pageInfo: {}
        },
        methods: {
            getPage: function (pageNum, pageSize) {
                var _this = this;
                var url = "/job/page?pageNum=" + pageNum;

                if (!pageSize) {
                    url += "&pageSize=" + _this.pageInfo.pageSize;
                } else {
                    url += "&pageSize=" + pageSize;
                }

                $.getJSON(url, function (data) {
                    _this.pageInfo = data;
                });
            },
            /**
             * 删除就业
             */
            delJob: function (id) {
                layer.confirm('确认要删除吗？',
                    function () {
                        //发异步删除数据
                        $.ajax({
                            url: "/job/deleteById",
                            data: {
                                id: id
                            },
                            dataType: "json",
                            type: "delete",
                            success: function (result) {
                                if (result.code === 200) {
                                    layer.msg('删除成功', {
                                        icon: 1,
                                        time: 1000
                                    });
                                    setTimeout(function () {
                                        window.location.reload();
                                    }, 1000);
                                } else {
                                    layer.alert(result.msg, {icon: 5});
                                }
                            }
                        });

                    });
            },
            /**
             *
             * 修改就业
             */
            editJob: function (editJobId) {
                //把要修改的editJobId存到sessionStorage中
                sessionStorage.setItem("editJobId", editJobId);
            }
        },
        created: function () {
            this.getPage(1, 10);
        }
    });

    layui.use(['form', 'upload', 'layer'], function () {

        var upload = layui.upload;
        // 文件上传实例
        var uploadInst = upload.render({
            elem: '#uploadData' //绑定元素
            , url: '/job/importData' //上传接口
            , accept: 'file' // 允许上传的文件类型
            , size: 1024 // 允许上传文件的最大体积,0表示无限制
            , auto: true //选择文件后自动上传
            , before: function (obj) {
                //上传文件前的操作
                // 显示加载弹窗
                loading = layer.load();
            }
            , done: function (res) {
                //上传完毕回调
                if (loading) {
                    // 关闭加载弹窗
                    layer.close(loading);
                }
                if (res.code === 200) {
                    layer.msg("导入成功！");
                    //延时操作，增加用户体验
                    setTimeout(function () {
                        // 重新加载 页面的表格
                        location.reload();
                    }, 800);

                } else {
                    //请求异常回调
                    layer.msg(res.msg, {icon: 2});
                }

            },
            error: function () {
                // 关闭加载弹窗
                layer.close(loading);
                //请求异常回调
                layer.msg('导入就业记录信息失败', {icon: 2});
            }
        });


        $("#truncateData").click(function(){

            layer.confirm('确认要清空就业数据吗？',
                function () {
                    //发异步删除数据
                    $.ajax({
                        url: "/job/truncate",
                        data: {
                            id: id
                        },
                        dataType: "json",
                        type: "delete",
                        success: function (result) {
                            if (result.code === 200) {
                                layer.msg('删除成功', {
                                    icon: 1,
                                    time: 1000
                                });
                                setTimeout(function () {
                                    window.location.reload();
                                }, 1000);
                            } else {
                                layer.alert(result.msg, {icon: 5});
                            }
                        }
                    });

                });
        });
    })

</script>
</html>
